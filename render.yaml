databases:
  - name: huy-ford-dong-thap-db
    databaseName: huy_ford_dong_thap
    user: huy_ford_user
    plan: free

services:
  - type: web
    name: huy-ford-dong-thap
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://huy-ford-dong-thap.onrender.com
      - key: CANONICAL_REDIRECT
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: huy-ford-dong-thap-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: REVALIDATION_SECRET
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: AI_API_KEY
        sync: false
      - key: AI_DAILY_QUOTA
        value: "500"
      - key: GA_MEASUREMENT_ID
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
