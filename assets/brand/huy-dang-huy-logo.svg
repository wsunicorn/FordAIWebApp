<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4f4f4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#dadada;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b4b4b4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer Shield/Ring -->
  <circle cx="100" cy="80" r="60" fill="#0f2e4a" />
  <circle cx="100" cy="80" r="54" fill="none" stroke="url(#silver)" stroke-width="2" />
  
  <!-- Stylized 'H' and Wheel spoke -->
  <path d="M75 55 L75 105 M125 55 L125 105 M75 80 L125 80" stroke="white" stroke-width="8" stroke-linecap="round" />
  
  <!-- Accent curves -->
  <path d="M60 80 A40 40 0 0 1 140 80" fill="none" stroke="url(#silver)" stroke-width="3" stroke-linecap="round" />
  
  <!-- Branding Text -->
  <text x="100" y="160" font-family="Geist, sans-serif" font-weight="900" font-size="18" fill="#0f2e4a" text-anchor="middle" letter-spacing="1">HUYNH DANG HUY</text>
  <text x="100" y="180" font-family="Geist, sans-serif" font-weight="500" font-size="10" fill="#666" text-anchor="middle" letter-spacing="2">FORD CONSULTANT</text>
</svg>