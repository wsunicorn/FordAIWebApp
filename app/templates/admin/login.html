<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin login | {{ settings.app_name }}</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="{{ url_for('assets', path='/brand/favicon.svg') }}?v=20260608" type="image/svg+xml" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260608" />
    <meta name="theme-color" content="#0f2e4a" />
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}" />
  </head>
  <body class="admin-login-body">
    <div class="admin-ambience" aria-hidden="true"></div>
    <div class="site-noise" aria-hidden="true"></div>
    <main class="admin-login-card">
      <img class="mx-auto h-20 w-20 rounded-lg border border-border bg-white object-contain p-1 shadow-sm" src="{{ url_for('assets', path='/brand/huy-dang-huy-logo.svg') }}" alt="" />
      <p class="admin-kicker">Quan tri noi bo</p>
      <h1>Dang nhap admin</h1>
      <p>
        Khu vuc nay dung de xem lead, cap nhat trang thai cham soc va quan ly du lieu
        xe/gia truoc khi public.
      </p>
      {% if error %}
        <div class="admin-error">{{ error }}</div>
      {% endif %}
      <form action="/admin/login" method="post" class="admin-form">
        <input type="hidden" name="next_path" value="{{ next_path or '/admin' }}" />
        <label class="field">
          Tai khoan
          <input name="username" autocomplete="username" required />
        </label>
        <label class="field">
          Mat khau
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button class="btn btn-primary" type="submit">Dang nhap</button>
      </form>
      <p class="admin-muted">
        Doi `ADMIN_PASSWORD` va `SECRET_KEY` truoc khi dua len production.
      </p>
    </main>
  </body>
</html>
