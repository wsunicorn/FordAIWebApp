<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin login | {{ settings.app_name }}</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="{{ url_for('assets', path='/brand/favicon.svg') }}?v=20260608" type="image/svg+xml" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260608" />
    <meta name="theme-color" content="#0f2e4a" />
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}" />
  </head>
  <body class="admin-login-body">
    <div class="admin-ambience" aria-hidden="true"></div>
    <main class="admin-login-card">
      <img src="{{ url_for('assets', path='/brand/huy-dang-huy-logo.svg') }}" alt="" />
      <p class="admin-kicker">Nội bộ</p>
      <h1>Đăng nhập admin</h1>
      <p>Quản lý lead, giá tham khảo, nội dung và tri thức AI trước khi hiển thị trên website.</p>

      {% if error %}
        <div class="admin-login-error" role="alert">{{ error }}</div>
      {% endif %}

      <form action="/admin/login" method="post" class="admin-form">
        <input type="hidden" name="next_path" value="{{ next_path or '/admin' }}" />
        <label class="field">
          Tài khoản
          <input name="username" autocomplete="username" required />
        </label>
        <label class="field">
          Mật khẩu
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button class="btn btn-primary" type="submit">Đăng nhập</button>
      </form>

      <p class="admin-muted">Hãy rotate ADMIN_PASSWORD và SECRET_KEY sau mỗi lần bị lộ secret.</p>
    </main>
  </body>
</html>
