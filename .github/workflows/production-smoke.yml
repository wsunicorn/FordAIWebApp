name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke Render production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PRODUCTION_BASE_URL: https://huy-ford-dong-thap.onrender.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run smoke test
        run: python scripts/smoke.py "$PRODUCTION_BASE_URL" --check-db
